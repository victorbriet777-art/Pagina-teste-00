<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aline Choppe Burger — Burger de verdade. Choppe gelado.</title>
<meta name="description" content="Hambúrgueres artesanais, sabores marcantes e choppe gelado. Terça a domingo, 19h às 00h." />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  :root {
    /* ===== Cores ===== */
    --color-bg: #090908;
    --color-primary: #FFAA1D;
    --color-accent: #FF4B16;
    --color-text: #FFF8ED;
    --color-text-secondary: #D9D2C4;
    --color-border: rgba(255, 170, 29, 0.28);

    /* ===== Tipografia ===== */
    --font-display: "Anton", "Bebas Neue", "Oswald", sans-serif;
    --font-body: "Inter", "Manrope", -apple-system, BlinkMacSystemFont, sans-serif;

    /* ===== Espaçamentos ===== */
    --space-xs: 0.5rem;
    --space-sm: 1rem;
    --space-md: 1.5rem;
    --space-lg: 2.5rem;
    --space-xl: 4rem;

    /* ===== Layout ===== */
    --container-max: 1340px;
    --container-padding: clamp(1.25rem, 5vw, 4rem);
    --radius-cta: 12px;
    --transition-fast: 220ms cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--color-bg);
    color: var(--color-text);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  a { color: inherit; text-decoration: none; }

  :focus-visible {
    outline: 2px solid var(--color-primary);
    outline-offset: 3px;
    border-radius: 4px;
  }

  /* ===== HERO ===== */
  .hero {
    position: relative;
    min-height: 100svh;
    width: 100%;
    display: flex;
    flex-direction: column;
    background: var(--color-bg);
    overflow: hidden;
  }

  /* Foto do burger cobrindo toda a hero, espelhada para o lanche ficar à esquerda */
  .hero__bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: 30% 58%;
    z-index: 0;
  }

  /* Vinheta: escurece progressivamente da esquerda (burger) para a direita (texto) */
  .hero__scrim {
    position: absolute;
    inset: 0;
    z-index: 1;
    background:
      linear-gradient(100deg,
        rgba(9, 9, 8, 0.12) 0%,
        rgba(9, 9, 8, 0.30) 34%,
        rgba(9, 9, 8, 0.72) 58%,
        rgba(9, 9, 8, 0.93) 78%,
        rgba(9, 9, 8, 0.97) 100%
      ),
      linear-gradient(0deg,
        rgba(9, 9, 8, 0.88) 0%,
        rgba(9, 9, 8, 0.15) 22%,
        rgba(9, 9, 8, 0.05) 55%,
        rgba(9, 9, 8, 0.55) 100%
      );
    pointer-events: none;
  }

  /* Brilho quente atrás do lanche para destacá-lo */
  .hero__glow {
    position: absolute;
    inset: 0;
    z-index: 1;
    background: radial-gradient(ellipse 46% 55% at 26% 55%, rgba(255, 170, 29, 0.16), transparent 62%);
    mix-blend-mode: screen;
    pointer-events: none;
  }

  .container {
    width: 100%;
    max-width: var(--container-max);
    margin-inline: auto;
    padding-inline: var(--container-padding);
    position: relative;
    z-index: 2;
  }

  /* ===== HEADER ===== */
  .site-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-block: var(--space-md);
    gap: var(--space-md);
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 0.55em;
    line-height: 1;
  }

  .brand__name {
    font-family: var(--font-display);
    font-size: clamp(1.2rem, 1.7vw, 1.55rem);
    letter-spacing: 0.03em;
    color: var(--color-text);
    text-shadow: 0 2px 14px rgba(0,0,0,0.55);
  }

  .brand__suffix {
    font-family: var(--font-body);
    font-size: clamp(0.6rem, 1vw, 0.72rem);
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--color-text-secondary);
  }

  .nav-cta {
    display: inline-flex;
    align-items: center;
    padding: 0.7em 1.3em;
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 0.8rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--color-text);
    border: 1px solid var(--color-border);
    border-radius: 999px;
    background: rgba(9, 9, 8, 0.35);
    backdrop-filter: blur(6px);
    transition: border-color var(--transition-fast), background-color var(--transition-fast), transform var(--transition-fast);
    white-space: nowrap;
  }

  .nav-cta:hover {
    border-color: var(--color-primary);
    background: rgba(255, 170, 29, 0.14);
    transform: translateY(-1px);
  }

  /* ===== MAIN GRID ===== */
  .hero__main {
    flex: 1;
    display: flex;
    align-items: center;
    padding-block: var(--space-lg);
  }

  .hero__grid {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    width: 100%;
  }

  /* texto: ocupa as colunas da direita, sobre a parte mais escura da foto */
  .hero__content {
    grid-column: 6 / span 7;
    max-width: 640px;
    margin-left: auto;
    position: relative;
  }

  /* ===== BADGE ===== */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 0.6em;
    padding: 0.5em 1em;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--color-primary);
    border: 1px solid var(--color-border);
    border-radius: 999px;
    background: rgba(9, 9, 8, 0.4);
    backdrop-filter: blur(6px);
    margin-bottom: var(--space-md);
  }

  .badge__dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--color-accent);
    flex-shrink: 0;
  }

  /* ===== HEADLINE ===== */
  .headline {
    font-family: var(--font-display);
    font-weight: 400;
    font-size: clamp(2.75rem, 5.4vw, 6.1rem);
    line-height: 0.9;
    letter-spacing: 0.005em;
    text-transform: uppercase;
    color: var(--color-text);
    margin-bottom: var(--space-md);
    text-shadow: 0 6px 30px rgba(0,0,0,0.55);
  }

  .headline .accent-amber { color: var(--color-primary); }
  .headline .accent-orange { color: var(--color-accent); }

  /* ===== SUBHEADLINE ===== */
  .subheadline {
    font-family: var(--font-body);
    font-size: clamp(1rem, 1.3vw, 1.15rem);
    line-height: 1.55;
    color: var(--color-text-secondary);
    max-width: 480px;
    margin-bottom: var(--space-lg);
    text-shadow: 0 2px 16px rgba(0,0,0,0.5);
  }

  /* ===== CTA ===== */
  .cta-group {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: var(--space-sm);
  }

  .cta {
    display: inline-flex;
    align-items: center;
    gap: 0.6em;
    padding: 1.05em 2em;
    font-family: var(--font-body);
    font-weight: 700;
    font-size: 0.95rem;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    color: #14100A;
    background: var(--color-primary);
    border-radius: var(--radius-cta);
    box-shadow: 0 12px 34px -14px rgba(255, 170, 29, 0.55);
    transition: transform var(--transition-fast), background-color var(--transition-fast), box-shadow var(--transition-fast);
  }

  .cta:hover,
  .cta:focus-visible {
    background: var(--color-accent);
    color: var(--color-text);
    transform: translateY(-2px);
    box-shadow: 0 10px 30px -12px rgba(255, 75, 22, 0.5);
  }

  .cta__arrow {
    display: inline-block;
    transition: transform var(--transition-fast);
  }

  .cta:hover .cta__arrow,
  .cta:focus-visible .cta__arrow {
    transform: translateX(4px);
  }

  .support-info {
    display: flex;
    align-items: center;
    gap: 0.5em;
    font-size: 0.82rem;
    color: var(--color-text-secondary);
    padding-left: 0.2em;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
  }

  .support-info__mark {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--color-primary);
    flex-shrink: 0;
  }

  /* ===== ENTRADA (progressive reveal) ===== */
  [data-reveal] {
    opacity: 0;
    transform: translateY(14px);
  }

  .js-ready [data-reveal] {
    animation: reveal-in 700ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  .js-ready [data-reveal="1"] { animation-delay: 60ms; }
  .js-ready [data-reveal="2"] { animation-delay: 160ms; }
  .js-ready [data-reveal="3"] { animation-delay: 260ms; }
  .js-ready [data-reveal="4"] { animation-delay: 360ms; }
  .js-ready [data-reveal="5"] { animation-delay: 440ms; }

  @keyframes reveal-in {
    to { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    [data-reveal] { opacity: 1; transform: none; animation: none !important; }
    html { scroll-behavior: auto; }
    .cta, .nav-cta, .cta__arrow { transition: none; }
  }

  /* ===== RESPONSIVIDADE ===== */
  @media (max-width: 1024px) {
    .headline { font-size: clamp(2.5rem, 6.4vw, 4.2rem); }
    .hero__content { grid-column: 5 / span 8; }
  }

  @media (max-width: 860px) {
    .hero__bg { object-position: 38% 62%; }
    .hero__scrim {
      background:
        linear-gradient(180deg,
          rgba(9, 9, 8, 0.55) 0%,
          rgba(9, 9, 8, 0.30) 30%,
          rgba(9, 9, 8, 0.55) 58%,
          rgba(9, 9, 8, 0.95) 100%
        );
    }
    .hero__glow { display: none; }
    .hero__grid { grid-template-columns: 1fr; }
    .hero__content {
      grid-column: 1 / -1;
      max-width: 100%;
      margin-left: 0;
      margin-top: auto;
    }
    .hero__main { align-items: flex-end; }
  }

  @media (max-width: 560px) {
    .headline {
      font-size: clamp(2.3rem, 11vw, 3.2rem);
    }
    .subheadline { max-width: 100%; }
    .cta { width: 100%; justify-content: center; }
    .cta-group { width: 100%; }
    .site-header { padding-block: var(--space-sm); }
  }
</style>
</head>
